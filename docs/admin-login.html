<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

  <video autoplay muted loop id="main-bg-video">
    <source src="main-bg.mp4" type="video/mp4">
    Aapka browser video tag support nahi karta.
  </video>

  <div class="auth-container" style="max-width: 500px;">

    <img src="logo.png" alt="Logo" class="logo">
    <h2>Admin Portal Login</h2>
    
    <form id="admin-login-form" class="form-vertical">
      <input type="email" id="admin-login-email" placeholder="Admin Email" required>
      <input type="password" id="admin-login-password" placeholder="Admin Password" required>
      <button type="submit" class="btn">Login as Admin</button>
    </form>
    
    <a href="index.html" class="btn btn-secondary" style="margin-top: 10px;">Back to Home</a>
  </div>
  
</body>
</html>
