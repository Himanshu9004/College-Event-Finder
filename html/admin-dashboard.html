<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  </head>
<body>
  
  <video autoplay muted loop id="main-bg-video">
    <source src="main-bg.mp4" type="video/mp4">
    Aapka browser video tag support nahi karta.
  </video>

  <header class="site-header">
    <div class="header-left">
      <img src="logo.png" alt="Logo" class="logo-small">
      <span class="site-title">Admin Portal</span>
    </div>
    <nav class="header-nav">
      <a href="#" id="logout-btn">Logout</a>
    </nav>
  </header>

  <div class="container">
    <h2 style="text-align: center;">Admin Dashboard</h2>
    
    <div class="stat-card">
      <h3>Total Users</h3>
      <p id="total-users">...</p>
    </div>
    <div class="stat-card">
      <h3>Total Organizations</h3>
      <p id="total-orgs">...</p>
    </div>

    <div class="card-dark">
      <h3>Manage Organizations</h3>
      <button id="list-orgs-btn" class="btn">Show All Registered Organizations</button>
      <div id="org-list-container" style="margin-top: 20px;">
        </div>
    </div>
  </div>
  
  <script src="script.js" defer></script>
</body>
</html>
