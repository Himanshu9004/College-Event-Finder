<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organization Registration</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Logo" class="logo">
    <h2>Organization Registration</h2>
    <form id="org-register-form">
      <input type="text" id="org-name" placeholder="Organization Name" required>
      <input type="email" id="org-email" placeholder="Email" required>
      <input type="password" id="org-password" placeholder="Password" required>
      <input type="text" id="org-college" placeholder="University/College Name" required>
      <button type="submit" class="btn">Register</button>
    </form>
    <p>Already registered? <a href="org-login.html">Login Here</a></p>
    <a href="index.html" class="btn">⬅ Back</a>
  </div>
</body>
</html>
